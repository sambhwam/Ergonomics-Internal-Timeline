<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ergonomics Internal Timeline</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --line-color: #334155;
      --completed-color: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 1.5rem;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .btn {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .btn-save {
      background-color: #10b981;
    }
    .btn-save:hover {
      background-color: #059669;
    }

    .btn-cancel {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
    }
    .btn-cancel:hover {
      color: var(--text-main);
      background-color: #334155;
    }

    /* Horizontal Scroll Area */
    .timeline-wrapper {
      width: 100%;
      overflow-x: auto;
      padding-top: 1.5rem;
      padding-bottom: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border-color) var(--bg-color);
    }

    .timeline-wrapper::-webkit-scrollbar {
      height: 8px;
    }
    .timeline-wrapper::-webkit-scrollbar-track {
      background: var(--bg-color);
    }
    .timeline-wrapper::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    /* Horizontal Timeline */
    .timeline {
      display: flex;
      position: relative;
      gap: 2rem;
      min-width: max-content;
      padding: 0 1rem;
    }

    /* Horizontal Connecting Line */
    .timeline::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 1rem;
      right: 1rem;
      height: 2px;
      background-color: var(--line-color);
      z-index: 0;
    }

    .timeline-item {
      position: relative;
      display: flex;
      flex-direction: column;
      width: 290px;
    }

    /* Node Dot */
    .timeline-node {
      position: absolute;
      top: 0px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background-color: var(--bg-color);
      border: 3px solid var(--accent);
      z-index: 1;
      transition: all 0.3s ease;
    }

    .timeline-item.completed .timeline-node {
      background-color: var(--completed-color);
      border-color: var(--completed-color);
    }

    /* Card Frame */
    .card {
      margin-top: 1.75rem;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card:hover {
      border-color: #475569;
    }

    .card-body {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      flex: 1;
    }

    .checkbox-container {
      margin-top: 0.2rem;
    }

    .checkbox-container input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--completed-color);
    }

    .card-content {
      flex: 1;
      word-break: break-word;
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }

    .timeline-item.completed .card-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.85rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border-color);
    }

    .action-group {
      display: flex;
      gap: 0.3rem;
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: 500;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
    }

    .action-btn:hover {
      color: var(--text-main);
      background-color: #334155;
    }

    .action-btn.insert {
      color: var(--accent);
    }

    .action-btn.insert:hover {
      background-color: rgba(99, 102, 241, 0.15);
    }

    .action-btn.delete:hover {
      color: #ef4444;
    }

    /* Inline Edit Form */
    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      width: 100%;
    }

    .edit-input, .edit-textarea {
      width: 100%;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }

    .edit-input:focus, .edit-textarea:focus {
      border-color: var(--accent);
    }

    .edit-textarea {
      resize: vertical;
      min-height: 60px;
    }

    .edit-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Ergonomics Internal Timeline</h1>
      <button class="btn" onclick="addNewTask()">+ Add Task to End</button>
    </div>

    <div class="timeline-wrapper" id="timelineWrapper">
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // -------------------------------------------------------------
    // REPLACE THE VALUES BELOW WITH YOUR FIREBASE CONFIGURATION
    // -------------------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyDN6p8UKZ_xhVxA08EVGt4Sn61TMnT47m4",
      authDomain: "ergonomics-internal-timeline.firebaseapp.com",
      databaseURL: "https://ergonomics-internal-timeline-default-rtdb.firebaseio.com",
      projectId: "ergonomics-internal-timeline",
      storageBucket: "ergonomics-internal-timeline.firebasestorage.app",
      messagingSenderId: "169425208622",
      appId: "1:169425208622:web:e5701ac0c303e152d766bf"
    };
    

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tasksRef = db.ref('timeline_tasks');

    let tasks = [];

    // Real-time Database Listener: Triggers for ALL open embeds whenever anyone makes a change
    tasksRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        // Handle array conversion cleanly regardless of storage format
        tasks = Array.isArray(data) ? data.filter(Boolean) : Object.values(data);
      } else {
        // Initial default seed tasks if the database is brand new
        tasks = [
          { id: 1, date: 'Phase 1', title: 'Project Kickoff', desc: 'Define goals and set up workspace.', completed: true, isEditing: false },
          { id: 2, date: 'Phase 2', title: 'Design & Prototype', desc: 'Create wireframes and mockups for review.', completed: false, isEditing: false },
          { id: 3, date: 'Phase 3', title: 'Development', desc: 'Build core functionality and features.', completed: false, isEditing: false }
        ];
        syncToFirebase();
      }
      renderTasks();
    });

    // Write state back to Firebase
    function syncToFirebase() {
      // Strips local editing states before saving to DB so others don't see unfinished edits mid-typing
      const dataToSave = tasks.map(t => {
        const { isEditing, ...rest } = t;
        return rest;
      });
      tasksRef.set(dataToSave);
    }

    function renderTasks() {
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';

      tasks.forEach((task, index) => {
        const item = document.createElement('div');
        item.className = `timeline-item ${task.completed ? 'completed' : ''}`;

        if (task.isEditing) {
          // Inline Edit Mode
          item.innerHTML = `
            <div class="timeline-node"></div>
            <div class="card">
              <div class="edit-form">
                <input type="text" class="edit-input" id="edit-date-${task.id}" value="${escapeHtml(task.date)}" placeholder="Date / Phase">
                <input type="text" class="edit-input" id="edit-title-${task.id}" value="${escapeHtml(task.title)}" placeholder="Task Title">
                <textarea class="edit-textarea" id="edit-desc-${task.id}" placeholder="Task Description">${escapeHtml(task.desc)}</textarea>
                <div class="edit-actions">
                  <button class="btn btn-save" onclick="saveTask(${task.id})">Save</button>
                  <button class="btn btn-cancel" onclick="cancelEdit(${task.id})">Cancel</button>
                </div>
              </div>
            </div>
          `;
        } else {
          // View Mode
          item.innerHTML = `
            <div class="timeline-node"></div>
            <div class="card">
              <div class="card-body">
                <div class="checkbox-container">
                  <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id})">
                </div>
                <div class="card-content">
                  <div class="card-date">${escapeHtml(task.date)}</div>
                  <div class="card-title">${escapeHtml(task.title)}</div>
                  <div class="card-desc">${escapeHtml(task.desc)}</div>
                </div>
              </div>
              <div class="card-actions">
                <button class="action-btn insert" onclick="insertTaskAfter(${index})" title="Insert a step right after this item">+ Insert After</button>
                <div class="action-group">
                  <button class="action-btn" onclick="toggleEdit(${task.id})">Edit</button>
                  <button class="action-btn delete" onclick="deleteTask(${task.id})">Delete</button>
                </div>
              </div>
            </div>
          `;
        }

        timeline.appendChild(item);
      });
    }

    function toggleComplete(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      syncToFirebase();
    }

    function toggleEdit(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, isEditing: true } : t);
      renderTasks();
    }

    function cancelEdit(id) {
      const task = tasks.find(t => t.id === id);
      if (task && !task.title && !task.desc) {
        tasks = tasks.filter(t => t.id !== id);
        syncToFirebase();
      } else {
        tasks = tasks.map(t => t.id === id ? { ...t, isEditing: false } : t);
        renderTasks();
      }
    }

    function saveTask(id) {
      const dateVal = document.getElementById(`edit-date-${id}`).value || 'Upcoming';
      const titleVal = document.getElementById(`edit-title-${id}`).value || 'Untitled Step';
      const descVal = document.getElementById(`edit-desc-${id}`).value || '';

      tasks = tasks.map(t => t.id === id ? { ...t, date: dateVal, title: titleVal, desc: descVal, isEditing: false } : t);
      syncToFirebase();
    }

    function addNewTask() {
      const newId = Date.now();
      tasks.push({
        id: newId,
        date: 'Phase ' + (tasks.length + 1),
        title: '',
        desc: '',
        completed: false,
        isEditing: true
      });
      renderTasks();

      setTimeout(() => {
        const wrapper = document.getElementById('timelineWrapper');
        wrapper.scrollLeft = wrapper.scrollWidth;
      }, 50);
    }

    function insertTaskAfter(index) {
      const newId = Date.now();
      const newTask = {
        id: newId,
        date: 'Phase ' + (index + 2),
        title: '',
        desc: '',
        completed: false,
        isEditing: true
      };
      
      tasks.splice(index + 1, 0, newTask);
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      syncToFirebase();
    }

    function escapeHtml(str) {
      return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;") : '';
    }
  </script>
</body>
</html>
